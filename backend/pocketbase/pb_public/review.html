<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NexTrade Review</title>
<style>
body{font:16px system-ui;background:#f5f6fb;color:#151827;margin:0}main{max-width:1000px;margin:48px auto;padding:0 20px}.card{background:#fff;border-radius:18px;padding:22px;margin:14px 0;box-shadow:0 8px 24px #161b3d12}input{padding:12px;border:1px solid #d9dcec;border-radius:9px;margin:4px;width:min(280px,100%)}button{border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer}.approve{background:#4f46e5;color:white}.reject{background:#fee2e2;color:#b91c1c}.muted{color:#687086}.error{color:#c0263d}#review-queue{display:none}
</style></head><body><main><h1>NexTrade Review Queue</h1>
<section id="login-panel" class="card"><p class="muted">Sign in with the NexTrade app-admin account.</p><input id="admin-email" type="email" placeholder="admin email"><input id="admin-password" type="password" placeholder="password"><button class="approve" id="sign-in">Sign in</button><p class="error" id="login-error"></p></section>
<section id="review-queue"><p class="muted" id="queue-count"></p><div id="request-items"></div></section>
</main><script>
let authToken='';const api='/api';const panel=document.getElementById('login-panel'),queue=document.getElementById('review-queue'),errorBox=document.getElementById('login-error'),items=document.getElementById('request-items'),count=document.getElementById('queue-count');
document.getElementById('sign-in').addEventListener('click',reviewLogin);
async function reviewLogin(){errorBox.textContent='';const identity=document.getElementById('admin-email').value,password=document.getElementById('admin-password').value;const response=await fetch(api+'/collections/users/auth-with-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identity,password})});const data=await response.json();if(!response.ok||data.record.role!=='admin'){errorBox.textContent='Admin sign-in required.';return}authToken=data.token;panel.style.display='none';queue.style.display='block';loadQueue()}
async function apiRequest(path,options={}){return fetch(api+path,{...options,headers:{Authorization:'Bearer '+authToken,'Content-Type':'application/json',...(options.headers||{})}})}
async function loadQueue(){const response=await apiRequest('/collections/sourcing_requests/records?filter=status%3D%27submitted%27&sort=-created&perPage=100'),data=await response.json();count.textContent=data.items.length+' requests awaiting review';items.innerHTML=data.items.map(request=>`<article class="card"><b>${request.product_name}</b><p>${request.quantity||'Quantity not provided'} · ${request.target_country||'Market not provided'}</p><p class="muted">${request.description||''}</p><button class="approve" onclick="approveRequest('${request.id}')">Approve</button> <button class="reject" onclick="rejectRequest('${request.id}')">Reject</button></article>`).join('')}
async function approveRequest(id){const source=await apiRequest('/collections/sourcing_requests/records/'+id),request=await source.json();await apiRequest('/collections/approved_listings/records',{method:'POST',body:JSON.stringify({request:id,title:request.title,product_name:request.product_name,category:request.category,quantity:request.quantity,target_country:request.target_country,budget_range:request.budget_range,description:request.description})});await apiRequest('/collections/sourcing_requests/records/'+id,{method:'PATCH',body:JSON.stringify({status:'approved'})});loadQueue()}
async function rejectRequest(id){await apiRequest('/collections/sourcing_requests/records/'+id,{method:'PATCH',body:JSON.stringify({status:'rejected'})});loadQueue()}
</script></body></html>
