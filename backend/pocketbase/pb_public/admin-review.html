<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NexTrade Review</title>
<style>
:root{--ink:#161928;--muted:#72798b;--line:#e6e8ef;--violet:#5647e8;--violet-dark:#4033c8;--canvas:#f7f7fc;--danger:#c63c4b}*{box-sizing:border-box}body{font:15px Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;background:var(--canvas);color:var(--ink);margin:0}main{max-width:1440px;margin:0 auto;padding:42px 28px 80px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px}.eyebrow{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--violet);margin:0 0 8px}.topbar h1{font-size:32px;letter-spacing:-1px;margin:0}.topbar p{margin:8px 0 0;color:var(--muted)}.card{background:#fff;border:1px solid #ebedf4;border-radius:18px;padding:28px;box-shadow:0 16px 35px #272a5a0b}.login-card{max-width:650px}.fields{display:flex;gap:10px;margin:18px 0 0}input{padding:13px 14px;border:1px solid #dfe2ec;border-radius:10px;width:100%;font:inherit}button{border:0;border-radius:9px;padding:10px 14px;font:700 13px inherit;cursor:pointer}.approve{background:var(--violet);color:#fff}.approve:hover{background:var(--violet-dark)}.reject{background:#fff1f2;color:var(--danger)}.muted{color:var(--muted)}.error{color:var(--danger)}#review-queue{display:none}.queue-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.queue-head h2{font-size:18px;margin:0}.count{font-size:13px;font-weight:700;color:var(--violet);background:#eeecff;border-radius:999px;padding:7px 10px}.table-wrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:16px}.request-table{border-collapse:collapse;width:100%;min-width:960px}.request-table th{font-size:12px;text-align:left;color:#6f7788;background:#fafbfe;padding:14px 16px;border-bottom:1px solid var(--line);white-space:nowrap}.request-table td{padding:17px 16px;border-bottom:1px solid var(--line);vertical-align:middle}.request-table tr:last-child td{border-bottom:0}.product{font-weight:750}.sub{font-size:12px;color:var(--muted);margin-top:4px;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{background:#fff5d9;color:#936b00;border-radius:7px;font-size:12px;font-weight:750;padding:6px 8px}.actions{display:flex;gap:7px;white-space:nowrap}.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:14px}.page-info{font-size:13px;color:var(--muted)}.pager{display:flex;gap:8px}.pager button{background:#fff;border:1px solid var(--line);color:var(--ink)}.pager button:disabled{opacity:.4;cursor:not-allowed}.empty{padding:45px;text-align:center;color:var(--muted);border:1px dashed #d9dce8;border-radius:16px;background:#fff}@media(max-width:650px){main{padding:30px 16px}.topbar{display:block}.topbar h1{font-size:27px}.fields{display:block}.fields>*{margin-bottom:10px}.pagination{align-items:flex-start;gap:12px;flex-direction:column}}
</style></head><body><main><header class="topbar"><div><p class="eyebrow">NEXTRADE OPERATIONS</p><h1>Review Queue</h1><p>Approve vetted sourcing opportunities for the buyer-facing feed.</p></div><button class="reject" id="sign-out">Sign out</button></header>
<section id="login-panel" class="card login-card"><strong>Admin access</strong><p class="muted">Sign in with the NexTrade app-admin account to review submitted requests.</p><div class="fields"><input id="admin-email" type="email" placeholder="Admin email"><input id="admin-password" type="password" placeholder="Password"><button class="approve" id="sign-in">Sign in</button></div><p class="error" id="login-error"></p></section>
<section id="review-queue"><div class="queue-head"><h2>Pending requests</h2><span class="count" id="queue-count"></span></div><div id="request-items"></div><div class="pagination" id="pagination"><span class="page-info" id="page-info"></span><div class="pager"><button id="previous-page">Previous</button><button id="next-page">Next</button></div></div></section>
</main><script>
let authToken=localStorage.getItem('nextrade_review_token')||'',currentPage=1,totalPages=1;const api='/api',perPage=10;const panel=document.getElementById('login-panel'),queue=document.getElementById('review-queue'),errorBox=document.getElementById('login-error'),items=document.getElementById('request-items'),count=document.getElementById('queue-count'),pageInfo=document.getElementById('page-info'),previous=document.getElementById('previous-page'),next=document.getElementById('next-page');
document.getElementById('sign-in').addEventListener('click',reviewLogin);
document.getElementById('sign-out').addEventListener('click',()=>{localStorage.removeItem('nextrade_review_token');authToken='';queue.style.display='none';panel.style.display='block'});
previous.addEventListener('click',()=>{if(currentPage>1)loadQueue(currentPage-1)});next.addEventListener('click',()=>{if(currentPage<totalPages)loadQueue(currentPage+1)});
async function reviewLogin(){errorBox.textContent='';const identity=document.getElementById('admin-email').value,password=document.getElementById('admin-password').value;const response=await fetch(api+'/collections/users/auth-with-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identity,password})});const data=await response.json();if(!response.ok||data.record.role!=='admin'){errorBox.textContent='Admin sign-in required.';return}authToken=data.token;localStorage.setItem('nextrade_review_token',authToken);showQueue()}
function showQueue(){panel.style.display='none';queue.style.display='block';loadQueue(1).catch(()=>{localStorage.removeItem('nextrade_review_token');authToken='';queue.style.display='none';panel.style.display='block';errorBox.textContent='Your session expired. Sign in again.'})}
async function apiRequest(path,options={}){return fetch(api+path,{...options,headers:{Authorization:'Bearer '+authToken,'Content-Type':'application/json',...(options.headers||{})}})}
async function loadQueue(page){const response=await apiRequest('/collections/sourcing_requests/records?filter=status%3D%27submitted%27&page='+page+'&perPage='+perPage),data=await response.json();currentPage=data.page;totalPages=Math.max(data.totalPages,1);count.textContent=data.totalItems+' pending';items.innerHTML=data.items.length?`<div class="table-wrap"><table class="request-table"><thead><tr><th>Product</th><th>Intent</th><th>Trade time</th><th>Quantity</th><th>Target market</th><th>Status</th><th>Buyer contact</th><th>Actions</th></tr></thead><tbody>${data.items.map(request=>`<tr><td><div class="product">${request.product_name}</div><div class="sub">${request.category||'Other'} · ${request.product_description||request.description||'No description'}</div></td><td>${request.trade_intent==='sell'?'Sell':'Buy'}</td><td>${request.needed_at||'—'}</td><td>${request.quantity||'—'}</td><td>${request.target_country||'—'}</td><td><span class="badge">Submitted</span></td><td><div>${request.contact_name||'—'}</div><div class="sub">${request.contact_phone||request.contact_email||'—'}</div></td><td><div class="actions"><button class="approve" onclick="approveRequest('${request.id}')">Approve</button><button class="reject" onclick="rejectRequest('${request.id}')">Reject</button></div></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">No requests are waiting for review.</div>';pageInfo.textContent='Page '+currentPage+' of '+totalPages+' · '+data.totalItems+' requests';previous.disabled=currentPage<=1;next.disabled=currentPage>=totalPages}
function pbDateNow(){const date=new Date(),pad=value=>String(value).padStart(2,'0');return date.getFullYear()+'-'+pad(date.getMonth()+1)+'-'+pad(date.getDate())+' '+pad(date.getHours())+':'+pad(date.getMinutes())+':'+pad(date.getSeconds())}
async function removeExistingListings(id){const filter=encodeURIComponent("request='"+id+"'"),response=await apiRequest('/collections/approved_listings/records?filter='+filter+'&perPage=50'),data=await response.json();await Promise.all((data.items||[]).map(item=>apiRequest('/collections/approved_listings/records/'+item.id,{method:'DELETE'})))}
async function approveRequest(id){const source=await apiRequest('/collections/sourcing_requests/records/'+id),request=await source.json();await removeExistingListings(id);await apiRequest('/collections/approved_listings/records',{method:'POST',body:JSON.stringify({request:id,title:request.title,product_name:request.product_name,category:request.category,quantity:request.quantity,quantity_unit:request.quantity_unit,target_country:request.target_country,trade_intent:request.trade_intent,needed_at:request.needed_at,published_at:pbDateNow(),product_description:request.product_description,budget_range:request.budget_range,description:request.description})});await apiRequest('/collections/sourcing_requests/records/'+id,{method:'PATCH',body:JSON.stringify({status:'approved'})});loadQueue(currentPage)}
async function rejectRequest(id){await removeExistingListings(id);await apiRequest('/collections/sourcing_requests/records/'+id,{method:'PATCH',body:JSON.stringify({status:'rejected'})});loadQueue(currentPage)}
if(authToken){showQueue()}
</script></body></html>
